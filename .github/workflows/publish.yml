name: 'Publish'
on:
  create:
    branches:
      - 'master'

jobs:
  publish:
    if: startsWith(github.repository, 'noeppi-noeppi/') && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
      - name: 'Build Docker Image'
        run: |
          docker build \
          --pull --no-cache \
          -t "ghcr.io/noeppi-noeppi/cranberry:${{ github.ref_name }}" \
          -t "ghcr.io/noeppi-noeppi/cranberry:latest" \
          .
      - name: 'Login to package registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 'Publish Docker Image'
        run: |
          docker push "ghcr.io/noeppi-noeppi/cranberry:${{ github.ref_name }}"
          docker push "ghcr.io/noeppi-noeppi/cranberry:latest"
